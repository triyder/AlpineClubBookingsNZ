# Example only. Copy to ~/.codex/alpine-autonomous-high.config.toml before use.
# Autonomous local profile for low/medium risk, fully scoped issues only.
# Do not use for risk:high or risk:critical issues, live providers,
# production data, schema changes, deployment changes, or money movement.
# This profile must never auto-merge PRs or auto-close GitHub Issues.

model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
