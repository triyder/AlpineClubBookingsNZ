version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Wait 7 days before proposing updates to newly published versions so a
    # compromised or unstable release has time to be yanked before we adopt it.
    cooldown:
      default-days: 7
    ignore:
      # Keep Node runtime types aligned with package.json engines.
      # Remove this when the app runtime moves beyond Node 24.
      - dependency-name: "@types/node"
        versions: [">=25"]
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    ignore:
      # Keep production images on Active/Maintenance LTS Node releases.
      # Remove this once Node 26 enters Active LTS.
      - dependency-name: node
        versions: [">= 26, < 27"]
