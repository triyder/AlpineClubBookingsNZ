name: Bug Report
description: Report a reproducible problem in the TACBookings codebase.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Use non-production data and include exact routes or commands.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Booking
        - Membership
        - Payments
        - Xero
        - Finance
        - Lodge kiosk
        - Admin
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Checks Run
      description: Include tests, logs, or screenshots with secrets and personal data removed.
