name: Staging Accessibility Verification

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Temporary staging URL override. Leave blank to use the staging environment variable."
        required: false
        type: string
      paths:
        description: "Comma-separated paths to check. Leave blank to use defaults."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: staging-accessibility-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lighthouse:
    name: Lighthouse accessibility baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: ${{ inputs.base_url || vars.STAGING_APP_URL }}
    env:
      STAGING_APP_URL: ${{ inputs.base_url || vars.STAGING_APP_URL }}
      STAGING_A11Y_PATHS: ${{ inputs.paths || vars.STAGING_A11Y_PATHS || '/,/login,/register,/forgot-password,/faq,/contact' }}
      STAGING_A11Y_OUT_DIR: reports/lighthouse/staging
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run staging Lighthouse checks
        run: npm run review:staging:a11y

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: staging-lighthouse-${{ github.run_id }}
          path: reports/lighthouse/staging/
          if-no-files-found: error
