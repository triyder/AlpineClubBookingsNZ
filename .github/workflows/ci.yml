name: CI

# Residual risk accepted for the `npm audit --audit-level=high` gate:
# - `next-auth@5.0.0-beta.31` / `@auth/core@0.41.2` still declare an optional
#   `nodemailer@^7.0.7` peer while this repo validates `nodemailer@8.0.6`.
# - `.npmrc` pins `legacy-peer-deps=true` until Auth.js expands that optional
#   peer range. See `docs/PRODUCTION_DEPENDENCY_AUDIT.md` for the baseline.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Audit dependency graph
        run: npm audit --audit-level=high --package-lock-only

  static-analysis:
    name: Static analysis gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SEMGREP_IMAGE: semgrep/semgrep:1.161.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Semgrep static analysis
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            "${SEMGREP_IMAGE}" \
            semgrep scan \
              --config p/nextjs \
              --config p/typescript \
              --config p/javascript \
              --config p/react \
              --error \
              --metrics=off \
              --exclude node_modules \
              --exclude .next \
              --sarif-output semgrep-results.sarif

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif-${{ github.run_id }}
          path: semgrep-results.sarif
          if-no-files-found: ignore

  gitleaks-full-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan repository history with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  gitleaks-pr-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan pull request commit range with gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.28.0 \
            git /repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --exit-code=1 \
            --redact

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AUTH_SECRET: ci-auth-secret
      NEXTAUTH_SECRET: ci-auth-secret
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "false"
      CRON_SECRET: ci-cron-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tacbookings
      STRIPE_SECRET_KEY: sk_test_fake
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_fake
      NEXT_PUBLIC_CONTACT_EMAIL: bookings@example.com
      NEXT_PUBLIC_ADDRESSFINDER_KEY: ci-addressfinder-key
      XERO_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      XERO_ENABLE_DAILY_MEMBERSHIP_REFRESH: "false"
      XERO_ENABLE_LIVE_MEMBER_GROUP_LOOKUPS: "false"
      XERO_ENABLE_AUTOLOAD_XERO_CONTACT_GROUPS: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - verify
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_fake
      NEXT_PUBLIC_CONTACT_EMAIL: bookings@example.com
      NEXT_PUBLIC_ADDRESSFINDER_KEY: ci-addressfinder-key
      NEXT_PUBLIC_SENTRY_DSN: ""
      IMAGE_REF: tacbookings-ci:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${NEXT_PUBLIC_SENTRY_DSN}" \
            --build-arg NEXT_PUBLIC_CONTACT_EMAIL="${NEXT_PUBLIC_CONTACT_EMAIL}" \
            --build-arg NEXT_PUBLIC_ADDRESSFINDER_KEY="${NEXT_PUBLIC_ADDRESSFINDER_KEY}" \
            --tag "${IMAGE_REF}" \
            .

      - name: Fail on CRITICAL image vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Warn on HIGH image vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: "1"
          severity: HIGH
          skip-setup-trivy: true
