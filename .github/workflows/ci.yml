name: CI

# Residual risk accepted for the `npm audit --audit-level=high` gate:
# - `next-auth@5.0.0-beta.31` / `@auth/core@0.41.2` still declare an optional
#   `nodemailer@^7.0.7` peer while this repo validates `nodemailer@8.0.6`.
# - `.npmrc` pins `legacy-peer-deps=true` until Auth.js expands that optional
#   peer range. See `docs/PRODUCTION_DEPENDENCY_AUDIT.md` for the baseline.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Probe GitHub Advanced Security support
        id: dependency-review-support
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status_code=$(curl -sS \
            -o /tmp/dependency-review-support.json \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/default-setup")

          if [ "${status_code}" = "200" ]; then
            echo "supported=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "supported=false" >> "${GITHUB_OUTPUT}"
          echo "::warning::Dependency review is unavailable because GitHub Advanced Security is not enabled for ${GITHUB_REPOSITORY}."
          cat /tmp/dependency-review-support.json

      - name: Dependency review
        if: steps.dependency-review-support.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Probe code scanning availability
        id: codeql-support
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status_code=$(curl -sS \
            -o /tmp/codeql-support.json \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/default-setup")

          if [ "${status_code}" = "200" ]; then
            echo "upload=always" >> "${GITHUB_OUTPUT}"
            echo "artifact=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "upload=never" >> "${GITHUB_OUTPUT}"
          echo "artifact=true" >> "${GITHUB_OUTPUT}"
          echo "::warning::Code scanning is unavailable for ${GITHUB_REPOSITORY}; CodeQL SARIF will be uploaded as an artifact instead."
          cat /tmp/codeql-support.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          output: sarif-results
          upload: ${{ steps.codeql-support.outputs.upload }}

      - name: Upload CodeQL SARIF artifact
        if: steps.codeql-support.outputs.artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ github.run_id }}
          path: sarif-results
          if-no-files-found: error

  gitleaks-full-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan repository history with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  gitleaks-pr-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan pull request commit range with gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.28.0 \
            git /repo \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --exit-code=1 \
            --redact

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AUTH_SECRET: ci-auth-secret
      NEXTAUTH_SECRET: ci-auth-secret
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "false"
      CRON_SECRET: ci-cron-secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tacbookings
      STRIPE_SECRET_KEY: sk_test_fake
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_fake
      NEXT_PUBLIC_CONTACT_EMAIL: bookings@example.com
      NEXT_PUBLIC_ADDRESSFINDER_KEY: ci-addressfinder-key
      XERO_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      XERO_ENABLE_DAILY_MEMBERSHIP_REFRESH: "false"
      XERO_ENABLE_LIVE_MEMBER_GROUP_LOOKUPS: "false"
      XERO_ENABLE_AUTOLOAD_XERO_CONTACT_GROUPS: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - verify
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_fake
      NEXT_PUBLIC_CONTACT_EMAIL: bookings@example.com
      NEXT_PUBLIC_ADDRESSFINDER_KEY: ci-addressfinder-key
      NEXT_PUBLIC_SENTRY_DSN: ""
      IMAGE_REF: tacbookings-ci:${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${NEXT_PUBLIC_SENTRY_DSN}" \
            --build-arg NEXT_PUBLIC_CONTACT_EMAIL="${NEXT_PUBLIC_CONTACT_EMAIL}" \
            --build-arg NEXT_PUBLIC_ADDRESSFINDER_KEY="${NEXT_PUBLIC_ADDRESSFINDER_KEY}" \
            --tag "${IMAGE_REF}" \
            .

      - name: Fail on CRITICAL image vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Warn on HIGH image vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: "1"
          severity: HIGH
          skip-setup-trivy: true
