x-app-environment: &app-environment
  TZ: Pacific/Auckland
  DATABASE_URL: postgresql://tac:${DB_PASSWORD:-password}@postgres:5432/tacbookings?connection_limit=5&pool_timeout=10
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  AUTH_SECRET: ${AUTH_SECRET:-${NEXTAUTH_SECRET}}
  AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
  FEATURE_KIOSK: ${FEATURE_KIOSK:-false}
  FEATURE_CHORES: ${FEATURE_CHORES:-false}
  FEATURE_FINANCE_DASHBOARD: ${FEATURE_FINANCE_DASHBOARD:-false}
  FEATURE_WAITLIST: ${FEATURE_WAITLIST:-false}
  FEATURE_XERO_INTEGRATION: ${FEATURE_XERO_INTEGRATION:-false}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
  ADDY_API_KEY: ${ADDY_API_KEY:-}
  ADDY_API_SECRET: ${ADDY_API_SECRET:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  XERO_CLIENT_ID: ${XERO_CLIENT_ID}
  XERO_CLIENT_SECRET: ${XERO_CLIENT_SECRET}
  XERO_REDIRECT_URI: ${XERO_REDIRECT_URI}
  XERO_ENCRYPTION_KEY: ${XERO_ENCRYPTION_KEY}
  XERO_WEBHOOK_KEY: ${XERO_WEBHOOK_KEY}
  FINANCE_XERO_CLIENT_ID: ${FINANCE_XERO_CLIENT_ID}
  FINANCE_XERO_CLIENT_SECRET: ${FINANCE_XERO_CLIENT_SECRET}
  FINANCE_XERO_REDIRECT_URI: ${FINANCE_XERO_REDIRECT_URI}
  FINANCE_XERO_ENCRYPTION_KEY: ${FINANCE_XERO_ENCRYPTION_KEY}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  AWS_SES_ACCESS_KEY_ID: ${AWS_SES_ACCESS_KEY_ID}
  AWS_SES_SECRET_ACCESS_KEY: ${AWS_SES_SECRET_ACCESS_KEY}
  SES_SNS_TOPIC_ARN: ${SES_SNS_TOPIC_ARN}
  SES_SNS_ALLOW_UNSAFE_MISSING_TOPIC_ARN: ${SES_SNS_ALLOW_UNSAFE_MISSING_TOPIC_ARN:-false}
  EMAIL_FROM: ${EMAIL_FROM}
  CRON_SECRET: ${CRON_SECRET}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
  LEGACY_DASHBOARD_EXPORT_TOKEN: ${LEGACY_DASHBOARD_EXPORT_TOKEN:-}
  CRON_ENABLED: ${CRON_ENABLED:-true}
  BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
  BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
  BACKUP_S3_REGION: ${BACKUP_S3_REGION:-ap-southeast-2}
  BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
  BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
  BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
  BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
  BACKUP_RESTORE_VALIDATION_URL: ${BACKUP_RESTORE_VALIDATION_URL:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  SENTRY_DSN: ${SENTRY_DSN:-}
  NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
  SENTRY_ORG: ${SENTRY_ORG:-}
  SENTRY_PROJECT: ${SENTRY_PROJECT:-}
  SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}

x-app-service: &app-service
  image: ${APP_IMAGE:-${COMPOSE_PROJECT_NAME:-tacbookings}-app:local}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  depends_on:
    postgres:
      condition: service_healthy
  read_only: true
  tmpfs:
    - /tmp
    - /app/.next/cache:uid=1001,gid=1001,mode=0755
  security_opt:
    - no-new-privileges:true
  mem_limit: 1g
  cpus: 0.8
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "(test -n \"$AUTH_SECRET\" || test -n \"$NEXTAUTH_SECRET\") && test -n \"$CRON_SECRET\" && wget -qO- http://127.0.0.1:3000/api/health/ready >/dev/null || exit 1",
      ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: tac
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: tacbookings
      TZ: Pacific/Auckland
      PGTZ: Pacific/Auckland
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "max_connections=30"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tac -d tacbookings"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    <<: *app-service
    environment:
      <<: *app-environment
      APP_RUNTIME_ROLE: cron-leader

  app_blue:
    <<: *app-service
    environment:
      <<: *app-environment
      APP_RUNTIME_ROLE: web-blue
      CRON_ENABLED: "false"

  app_green:
    <<: *app-service
    environment:
      <<: *app-environment
      APP_RUNTIME_ROLE: web-green
      CRON_ENABLED: "false"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./deploy/caddy:/etc/caddy/deploy:ro
      - caddy_data:/data
      - caddy_config:/config

  migrate:
    image: ${MIGRATE_IMAGE:-${COMPOSE_PROJECT_NAME:-tacbookings}-migrate:local}
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Pacific/Auckland
      DATABASE_URL: postgresql://tac:${DB_PASSWORD:-password}@postgres:5432/tacbookings
    command: ./node_modules/.bin/prisma migrate deploy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
