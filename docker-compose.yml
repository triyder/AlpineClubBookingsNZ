x-app-environment: &app-environment
  TZ: Pacific/Auckland
  # Default DATABASE_URL for the WEB slots (app_blue / app_green). Prisma's
  # connection_limit is the hard pool ceiling per container. Advisory-lock
  # waiters hold their connection while blocked, so a single-lodge booking
  # burst on a 5-conn pool exhausts it and stalls every other request
  # (#1884, F17). Raised to 10 for headroom under ~100 concurrent users.
  #
  # Postgres runs max_connections=30 (see the postgres service) with the
  # default 3 superuser-reserved slots => 27 usable. The cron-leader (`app`)
  # overrides this to connection_limit=5 and `migrate` to =2, so the worst
  # case fits: blue(10) + green(10) + cron(5) = 25 steady, + migrate(2) during
  # a deploy window = 27 <= 27 usable. If a fork needs more web headroom, raise
  # Postgres to max_connections=40 AND its mem_limit to ~768m rather than
  # squeezing this ceiling (owner call — see docs/DEPLOYMENT.md "Connection
  # pool sizing").
  DATABASE_URL: postgresql://tac:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/tacbookings?connection_limit=10&pool_timeout=10
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  AUTH_SECRET: ${AUTH_SECRET:-${NEXTAUTH_SECRET}}
  AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
  ADDY_API_KEY: ${ADDY_API_KEY:-}
  ADDY_API_SECRET: ${ADDY_API_SECRET:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  USE_AWS_SES: ${USE_AWS_SES:-true}
  USE_SMTP_RELAY: ${USE_SMTP_RELAY:-false}
  EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-}
  EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-}
  EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-}
  EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD:-}
  BULK_SENDMAIL_LIMIT: ${BULK_SENDMAIL_LIMIT:-1}
  AWS_SES_ACCESS_KEY_ID: ${AWS_SES_ACCESS_KEY_ID}
  AWS_SES_SECRET_ACCESS_KEY: ${AWS_SES_SECRET_ACCESS_KEY}
  SES_SNS_TOPIC_ARN: ${SES_SNS_TOPIC_ARN}
  SES_SNS_ALLOW_UNSAFE_MISSING_TOPIC_ARN: ${SES_SNS_ALLOW_UNSAFE_MISSING_TOPIC_ARN:-false}
  # EMAIL_FROM is the only email-identity env var (besides transport secrets):
  # the envelope / Return-Path sender, which must be a provider-verified (SES)
  # address. From display name, support address, and contact-form recipient are
  # admin-managed DB-first (Admin > Email Messages / EmailMessageSetting).
  EMAIL_FROM: ${EMAIL_FROM}
  CRON_SECRET: ${CRON_SECRET}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
  SEED_LODGE_PASSWORD: ${SEED_LODGE_PASSWORD:-}
  LEGACY_DASHBOARD_EXPORT_TOKEN: ${LEGACY_DASHBOARD_EXPORT_TOKEN:-}
  CRON_ENABLED: ${CRON_ENABLED:-true}
  BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
  BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
  BACKUP_S3_REGION: ${BACKUP_S3_REGION:-ap-southeast-2}
  BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
  BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
  BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
  BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
  BACKUP_RESTORE_VALIDATION_URL: ${BACKUP_RESTORE_VALIDATION_URL:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  SENTRY_DSN: ${SENTRY_DSN:-}
  NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
  SENTRY_ORG: ${SENTRY_ORG:-}
  SENTRY_PROJECT: ${SENTRY_PROJECT:-}
  SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}

x-app-service: &app-service
  image: ${APP_IMAGE:-${COMPOSE_PROJECT_NAME:-tacbookings}-app:local}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  depends_on:
    postgres:
      condition: service_healthy
  read_only: true
  tmpfs:
    - /tmp
    - /app/.next/cache:uid=1001,gid=1001,mode=0755
  # Image Manager uploads. A named volume shared by all app replicas keeps
  # uploads persistent across redeploys and visible to every instance (the
  # read-only root filesystem above otherwise has no writable path here). The
  # volume inherits uid 1001 ownership from the image's /app/public/images on
  # first init (see Dockerfile), so the app user can write to it.
  volumes:
    - image_uploads:/app/public/images
  security_opt:
    - no-new-privileges:true
  mem_limit: 1g
  cpus: 0.8
  healthcheck:
    test:
      [
        "CMD-SHELL",
        '(test -n "$AUTH_SECRET" || test -n "$NEXTAUTH_SECRET") && test -n "$CRON_SECRET" && wget -qO- http://127.0.0.1:3000/api/health/ready >/dev/null || exit 1',
      ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      POSTGRES_USER: tac
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: tacbookings
      TZ: Pacific/Auckland
      PGTZ: Pacific/Auckland
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "max_connections=30"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tac -d tacbookings"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    <<: *app-service
    environment:
      <<: *app-environment
      APP_RUNTIME_ROLE: cron-leader
      # Cron-leader keeps the original 5-conn pool: its workload is scheduled
      # background jobs, not the concurrent web burst the slots above size for.
      # Holding it at 5 keeps the total within max_connections=30 (#1884, F17).
      DATABASE_URL: postgresql://tac:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/tacbookings?connection_limit=5&pool_timeout=10

  app_blue:
    <<: *app-service
    environment:
      <<: *app-environment
      APP_RUNTIME_ROLE: web-blue
      CRON_ENABLED: "false"

  app_green:
    <<: *app-service
    environment:
      <<: *app-environment
      APP_RUNTIME_ROLE: web-green
      CRON_ENABLED: "false"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./deploy/caddy:/etc/caddy/deploy:ro
      - caddy_data:/data
      - caddy_config:/config

  migrate:
    image: ${MIGRATE_IMAGE:-${COMPOSE_PROJECT_NAME:-tacbookings}-migrate:local}
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Pacific/Auckland
      # Bound the deploy-window migrate pool to 2 so a blue/green overlap that
      # also runs migrations still fits: blue(10)+green(10)+cron(5)+migrate(2)
      # = 27 <= 27 usable connections (max_connections=30 less 3 reserved)
      # (#1884, F17). migrate only needs a couple of connections for
      # `prisma migrate deploy`.
      DATABASE_URL: postgresql://tac:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/tacbookings?connection_limit=2&pool_timeout=10
    command: ./node_modules/.bin/prisma migrate deploy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  image_uploads:
